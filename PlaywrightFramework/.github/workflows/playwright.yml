# GitHub Actions CI/CD Pipeline for Playwright Tests
# This workflow runs tests automatically on push and pull requests

name: Playwright Tests

# Trigger events
on:
  # Run on every push to main or develop branches
  push:
    branches: [ main, develop, master ]
  
  # Run on pull requests to main or develop
  pull_request:
    branches: [ main, develop, master ]
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (e.g., @smoke, @regression)'
        required: false
        default: ''
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

# Jobs to run
jobs:
  # ==========================================
  # Lint & Format Check
  # ==========================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Install dependencies
      - name: Install dependencies
        run: npm ci
      
      # Run ESLint
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  # ==========================================
  # Run Playwright Tests
  # ==========================================
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    needs: lint  # Wait for lint job to pass
    
    # Strategy matrix for running across multiple configurations
    strategy:
      fail-fast: false  # Continue other jobs if one fails
      matrix:
        browser: [chromium, firefox, webkit]
        # Uncomment below for smoke/regression split
        # test-suite: [smoke, regression]
    
    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Install project dependencies
      - name: Install dependencies
        run: npm ci
      
      # Install Playwright browsers with dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      # Create necessary directories
      - name: Create directories
        run: |
          mkdir -p screenshots
          mkdir -p reports
          mkdir -p videos
      
      # Run tests based on inputs or matrix
      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.test_tag }}" != "" ]; then
            # Run with specific tag if manually triggered
            npx playwright test --grep "${{ github.event.inputs.test_tag }}" --project=${{ github.event.inputs.browser || 'chromium' }}
          else
            # Run all tests for the browser in matrix
            npx playwright test --project=${{ matrix.browser }}
          fi
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://demoqa.com' }}
          VALID_USERNAME: ${{ secrets.VALID_USERNAME || 'testuser' }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD || 'Test@123' }}
      
      # Upload test results as artifact
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests fail
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            reports/
            screenshots/
            videos/
            test-results/
          retention-days: 30
      
      # Upload HTML report
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/html-report/
          retention-days: 30

  # ==========================================
  # Smoke Tests Job (Fast Feedback)
  # ==========================================
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'  # Only on PRs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium
        env:
          CI: true

  # ==========================================
  # Report Summary
  # ==========================================
  report:
    name: Generate Report Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create summary
        run: |
          echo "# Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Run Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Browser Matrix" >> $GITHUB_STEP_SUMMARY
          echo "- Chromium ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Firefox ✅" >> $GITHUB_STEP_SUMMARY
          echo "- WebKit ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Test results and screenshots are available as artifacts." >> $GITHUB_STEP_SUMMARY
